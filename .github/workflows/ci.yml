name: CI

on:
  push:
    branches: [main, prod, dev]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Full gate
        run: make gate

  train:
    # Trainer path with the torch CPU wheel; the main gate stays torch-free
    # so the zero-extra offline contract is what `checks` verifies.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with torch (CPU wheel)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Trainer tests
        run: pytest tests/test_train.py tests/test_shards.py -q

      - name: Smoke incl. trainer stage
        run: crucible smoke
