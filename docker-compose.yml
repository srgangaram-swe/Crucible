# Optional real-infra path. The offline default needs NONE of this.
#
#   docker compose --profile stream up -d   # Redpanda (Kafka API) on :9092
#   docker compose --profile object up -d   # MinIO (S3 API) on :9000 (console :9001)
#
# Then e.g.:
#   pip install -e ".[stream]"
#   CRUCIBLE_KAFKA_BOOTSTRAP=localhost:9092 pytest tests/test_kafka_optional.py

services:
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    profiles: ["stream"]
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    profiles: ["object"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: crucible
      MINIO_ROOT_PASSWORD: crucible-dev-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
